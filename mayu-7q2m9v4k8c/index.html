RLと合言葉を知っている端末だけで開けます。</p></main><script>(function(){'use strict';var SALT='7xlAEJF32CjSXUqjhR8fDQ==',IV='3dqjO+0lNlsgKHlO',ITER=250000,FILES=['./data-0.txt','./data-1.txt'],STORE='until_mayu_unlock_v1',DATA='';function b64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}async function loadData(){if(DATA)return DATA;var parts=await Promise.all(FILES.map(function(u){return fetch(u,{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('load');return r.text()})}));DATA=parts.join('').trim();return DATA}async function decrypt(pass){var d=await loadData(),base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']),key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(d));if(!('DecompressionStream'in window))throw new Error('unsupported');var stream=new Blob([plain]).stream().pipeThrough(new DecompressionStream('gzip'));return await new Response(stream).text()}async function openApp(pass,remember){var err=document.getElementById('error'),load=document.getElementById('loading'),btn=document.getElementById('unlock');err.textContent='';load.classList.add('on');btn.disabled=true;try{var app=await decrypt(pass);if(remember)localStorage.setItem(STORE,pass);else localStorage.removeItem(STORE);document.open();document.write(app);document.close()}catch(e){err.textContent=e&&e.message==='unsupported'?'このブラウザでは開けません。Safariを最新版にしてな。':'合言葉が違います。もう一度確認してな。';load.classList.remove('on');btn.disabled=false;document.getElementById('pass').select()}}document.getElementById('unlockForm').addEventListener('submit',function(e){e.preventDefault();openApp(document.getElementById('pass').value,document.getElementById('remember').checked)});var saved='';try{saved=localStorage.getItem(STORE)||''}catch(e){}if(saved){document.getElementById('pass').value=saved;openApp(saved,true)}else document.getElementById('pass').focus()})();</script></body></html>
